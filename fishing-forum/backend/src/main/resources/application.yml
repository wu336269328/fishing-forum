# 钓鱼论坛 - 应用配置
server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8

spring:
  # 数据库配置
  datasource:
    url: jdbc:postgresql://localhost:5432/fishing_forum
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  # SQL初始化（首次启动时执行）
  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: true

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    # 驼峰命名映射
    map-underscore-to-camel-case: true
    # 日志输出SQL（开发时开启）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键自增
      id-type: auto
      # 逻辑删除
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: FishingForumSecretKeyThatShouldBeAtLeast256BitsLongForHS256Algorithm2024
  expiration: 86400000  # 24小时（毫秒）

# 文件上传路径
upload:
  path: ./uploads/
